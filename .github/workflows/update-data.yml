name: Nightly Data Crawl

on:
  schedule:
    # 12:30 UTC = 20:30 SGT (8:30 PM)
    - cron: '30 12 * * *'
    # 13:00 UTC = 21:00 SGT (9:00 PM)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Needed to commit changes back to the repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Download latest Excel file
        run: curl -fsSL -L -o data.xlsx "https://file.go.gov.sg/govtechinternshipprojects2026.xlsx"
          
      - name: Parse Excel to JSON
        run: node scripts_build_jobs_json.mjs

      - name: Update "Last updated" date in HTML
        run: |
          # Use Singapore timezone for the date stamp
          export TZ="Asia/Singapore"
          DATE_STR=$(date +"%-d %b %Y")
          perl -0777 -i -pe "s/Last updated: [^<]*/Last updated: ${DATE_STR}/g" index.html
          perl -0777 -i -pe "s/\*Last updated: .+?\*/\*Last updated: ${DATE_STR}\*/g" README.md

      - name: Commit and push changes
        run: |
          export TZ="Asia/Singapore"
          git config --global user.name "Zhang Jing Wen"
          git config --global user.email "92678536+pebblepaw@users.noreply.github.com"
          git add jobs.json index.html README.md data.xlsx
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update job listings from source ($(date +'%d %b %Y'))" && git push)
